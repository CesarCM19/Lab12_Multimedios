<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Components · User Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font-main: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --bg:           #060b18;
      --card-bg:      #0f172a;
      --border:       rgba(255,255,255,0.07);
      --text-primary: #f8fafc;
      --text-muted:   #64748b;
      --accent:       #6366f1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(56,189,248,0.06) 0%, transparent 60%);
    }

    .scene {
      width: min(520px, 100%);
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    header { display: flex; flex-direction: column; gap: 0.3rem; }

    .label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-family: var(--font-mono);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    h1 span { color: var(--accent); }

    /* CSS Parts desde el documento padre */
    user-card::part(button) { letter-spacing: 0.04em; }

    .event-log {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .event-log-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    #log-entries {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 120px;
      overflow-y: auto;
    }
    .log-entry { display: flex; gap: 0.75rem; align-items: baseline; }
    .log-time   { color: #475569; flex-shrink: 0; }
    .log-event  { color: #7dd3fc; }
    .log-detail { color: #a5b4fc; }
    .empty      { color: #334155; font-style: italic; }
  </style>
</head>
<body>

<div class="scene">
  <header>
    <span class="label">Web Components · Shadow DOM · Vitest</span>
    <h1>User <span>Dashboard</span></h1>
  </header>

  <user-dashboard id="dashboard">
    <user-card    slot="card"    name="Alonso" role="Profesor"></user-card>
    <weather-time slot="weather" city="Liberia, CR" temp="31" condition="Sunny"></weather-time>
    <warning-badge slot="badge"  message="Sesión por expirar"></warning-badge>
  </user-dashboard>

  <div class="event-log">
    <div class="event-log-title">🔌 Event log</div>
    <div id="log-entries">
      <span class="empty">Esperando eventos… (haz click en Saludar)</span>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     TODOS los custom elements definidos ANTES del </body>
     para que estén registrados cuando el parser conecte los nodos.
     Sin imports externos → compatible con GH Pages sin configuración.
════════════════════════════════════════════════════════════════ -->
<script type="module">

/* ─────────────────────────────────────────────
   1. <user-card>
   Atributos: name | role | avatar
   Parts:     avatar | name | role | button
   Eventos:   greet (bubbles, composed)
───────────────────────────────────────────── */
class UserCard extends HTMLElement {
  static get observedAttributes() { return ['name', 'role', 'avatar']; }

  constructor() {
    super();
    this.attachShadow({ mode: 'open' });
  }

  connectedCallback()                          { this.render(); this._bind(); }
  attributeChangedCallback(n, o, v) { if (o !== v) { this.render(); this._bind(); } }

  get _name()   { return this.getAttribute('name')   || ''; }
  get _role()   { return this.getAttribute('role')   || ''; }
  get _avatar() { return this.getAttribute('avatar') || ''; }

  _bind() {
    this.shadowRoot.querySelector('button')?.addEventListener('click', () => {
      this.dispatchEvent(new CustomEvent('greet', {
        detail: { name: this._name },
        bubbles: true,
        composed: true,
      }));
    });
  }

  render() {
    const { _name: name, _role: role, _avatar: avatar } = this;
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; font-family: var(--font-main, 'DM Sans', sans-serif); }

        .card {
          background: var(--card-bg, #0f172a);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 20px;
          padding: 1.5rem;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 0.75rem;
          text-align: center;
          position: relative;
          overflow: hidden;
        }
        .card::before {
          content: '';
          position: absolute;
          top: -40px; left: -40px;
          width: 120px; height: 120px;
          background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%);
          pointer-events: none;
        }

        .avatar {
          width: 72px; height: 72px;
          border-radius: 50%;
          border: 3px solid rgba(99,102,241,0.6);
          box-shadow: 0 0 20px rgba(99,102,241,0.4);
          background: linear-gradient(135deg, #6366f1, #8b5cf6);
          display: flex; align-items: center; justify-content: center;
          font-size: 1.8rem; color: white; font-weight: 700;
          overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .name {
          font-size: 1.15rem; font-weight: 700;
          color: var(--text-primary, #f8fafc);
          letter-spacing: -0.02em; margin: 0;
        }
        .role {
          font-size: 0.78rem; font-weight: 500;
          color: var(--text-muted, #94a3b8);
          text-transform: uppercase; letter-spacing: 0.12em;
          margin: 0;
          background: rgba(99,102,241,0.15);
          padding: 0.2rem 0.7rem; border-radius: 20px;
        }
        button {
          margin-top: 0.5rem;
          background: linear-gradient(135deg, #6366f1, #8b5cf6);
          color: white; border: none; border-radius: 12px;
          padding: 0.55rem 1.4rem;
          font-size: 0.85rem; font-weight: 600;
          cursor: pointer; font-family: inherit;
          transition: transform 0.15s ease, box-shadow 0.15s ease;
          box-shadow: 0 4px 14px rgba(99,102,241,0.4);
        }
        button:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.55); }
        button:active { transform: translateY(0); }
      </style>

      <div class="card">
        <div class="avatar" part="avatar">
          ${avatar ? `<img src="${avatar}" alt="${name}" />` : name.charAt(0).toUpperCase()}
        </div>
        <p   class="name" part="name">${name}</p>
        <span class="role" part="role">${role}</span>
        <button part="button">Saludar</button>
      </div>`;
  }
}
customElements.define('user-card', UserCard);


/* ─────────────────────────────────────────────
   2. <weather-time>
   Atributos: city | temp | condition
   Parts:     city | temp | condition | icon
───────────────────────────────────────────── */
class WeatherTime extends HTMLElement {
  static get observedAttributes() { return ['city', 'temp', 'condition']; }
  #tick = null;

  constructor() { super(); this.attachShadow({ mode: 'open' }); }

  connectedCallback()    { this.render(); this._clock(); }
  disconnectedCallback() { clearInterval(this.#tick); }

  attributeChangedCallback(n, o, v) {
    if (o === v || !this.shadowRoot.innerHTML) return;
    const map = {
      city:      () => this.shadowRoot.querySelector('.city')?.textContent = v,
      temp:      () => this.shadowRoot.querySelector('.temp')?.textContent = `${v} °C`,
      condition: () => {
        this.shadowRoot.querySelector('.condition')?.textContent = v ?? '';
        this.shadowRoot.querySelector('.icon')?.textContent = this._icon(v ?? '');
      },
    };
    map[n]?.();
  }

  get _city()      { return this.getAttribute('city')      || 'Ciudad'; }
  get _temp()      { return this.getAttribute('temp')      || '--'; }
  get _condition() { return this.getAttribute('condition') || 'Clear'; }

  _icon(c) {
    const m = { sunny:'☀️',clear:'☀️',cloudy:'☁️',overcast:'☁️',rainy:'🌧️',
                rain:'🌧️',stormy:'⛈️',storm:'⛈️',windy:'💨',snowy:'❄️',
                snow:'❄️',foggy:'🌫️',fog:'🌫️',partlycloudy:'⛅' };
    return m[c.toLowerCase().replace(/\s/g,'')] || '🌡️';
  }

  _fmt() {
    return new Date().toLocaleTimeString('es-CR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  _clock() {
    const el = this.shadowRoot.querySelector('.time');
    if (!el) return;
    this.#tick = setInterval(() => { el.textContent = this._fmt(); }, 1000);
  }

  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; font-family: var(--font-main, 'DM Sans', sans-serif); }

        .widget {
          background: linear-gradient(135deg, #0c1a3a 0%, #0f2851 60%, #1a1040 100%);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 20px;
          padding: 1.5rem;
          position: relative; overflow: hidden; color: white;
        }
        .widget::after {
          content: '';
          position: absolute; bottom: -30px; right: -30px;
          width: 130px; height: 130px;
          background: radial-gradient(circle, rgba(56,189,248,0.2) 0%, transparent 70%);
          pointer-events: none;
        }
        .top {
          display: flex; justify-content: space-between;
          align-items: flex-start; margin-bottom: 1rem;
        }
        .city {
          font-size: 0.8rem; font-weight: 600; color: #94a3b8;
          text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 0.3rem;
        }
        .time {
          font-size: 1rem; font-weight: 700; color: #e2e8f0;
          font-variant-numeric: tabular-nums; letter-spacing: 0.05em;
        }
        .icon {
          font-size: 2.5rem; line-height: 1;
          filter: drop-shadow(0 0 10px rgba(251,191,36,0.5));
        }
        .bottom { display: flex; align-items: baseline; gap: 0.5rem; }
        .temp {
          font-size: 2.2rem; font-weight: 800;
          color: #f8fafc; letter-spacing: -0.04em; line-height: 1;
        }
        .condition { font-size: 0.9rem; font-weight: 500; color: #7dd3fc; align-self: center; }
      </style>

      <div class="widget">
        <div class="top">
          <div>
            <p class="city" part="city">${this._city}</p>
            <span class="time">${this._fmt()}</span>
          </div>
          <span class="icon" part="icon">${this._icon(this._condition)}</span>
        </div>
        <div class="bottom">
          <span class="temp"      part="temp">${this._temp} °C</span>
          <span class="condition" part="condition">${this._condition}</span>
        </div>
      </div>`;

    this._clock();
  }
}
customElements.define('weather-time', WeatherTime);


/* ─────────────────────────────────────────────
   3. <warning-badge>
   Atributos: pulsing (booleano reactivo) | message
   Parts:     badge | dot | icon | text
───────────────────────────────────────────── */
class WarningBadge extends HTMLElement {
  static get observedAttributes() { return ['pulsing', 'message']; }

  constructor() { super(); this.attachShadow({ mode: 'open' }); }

  connectedCallback() { this.render(); }

  attributeChangedCallback(name, oldVal, newVal) {
    if (oldVal === newVal) return;
    if (name === 'pulsing') {
      this._updatePulse();
    } else if (name === 'message') {
      const el = this.shadowRoot.querySelector('.text');
      if (el) el.textContent = newVal || '';
    }
  }

  get pulsing() { return this.hasAttribute('pulsing'); }
  set pulsing(v) { v ? this.setAttribute('pulsing','') : this.removeAttribute('pulsing'); }

  get message() { return this.getAttribute('message') || this.textContent.trim() || 'Advertencia'; }

  _updatePulse() {
    this.shadowRoot.querySelector('.badge')?.classList.toggle('is-pulsing', this.pulsing);
  }

  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: inline-block; font-family: var(--font-main, 'DM Sans', sans-serif); }

        :host(:not([pulsing])) .badge { opacity: 0.55; filter: grayscale(0.3); }

        .badge {
          display: inline-flex; align-items: center; gap: 0.5rem;
          background: rgba(239,68,68,0.12);
          border: 1px solid rgba(239,68,68,0.35);
          border-radius: 999px;
          padding: 0.45rem 1rem;
          color: #fca5a5;
          font-size: 0.82rem; font-weight: 600;
          position: relative;
          transition: opacity 0.3s ease, filter 0.3s ease;
          cursor: default; user-select: none;
        }

        .badge.is-pulsing::before {
          content: '';
          position: absolute; inset: -4px;
          border-radius: 999px;
          border: 2px solid rgba(239,68,68,0.5);
          animation: pulse-ring 1.4s cubic-bezier(0.4,0,0.6,1) infinite;
        }
        @keyframes pulse-ring {
          0%   { opacity: 1; transform: scale(1); }
          100% { opacity: 0; transform: scale(1.35); }
        }

        .badge.is-pulsing .icon { animation: blink 1.4s ease-in-out infinite; }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0.3; }
        }

        .dot {
          width: 7px; height: 7px; border-radius: 50%;
          background: #ef4444; flex-shrink: 0;
        }
        .badge.is-pulsing .dot { animation: dot-pulse 1.4s ease-in-out infinite; }
        @keyframes dot-pulse {
          0%, 100% { background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
          50%       { background: #fca5a5; box-shadow: 0 0 0 5px rgba(239,68,68,0); }
        }

        .icon { font-size: 1rem; line-height: 1; }
      </style>

      <div class="badge ${this.pulsing ? 'is-pulsing' : ''}" part="badge">
        <span class="dot"  part="dot"></span>
        <span class="icon" part="icon">⚠️</span>
        <span class="text" part="text">${this.message}</span>
      </div>`;
  }
}
customElements.define('warning-badge', WarningBadge);


/* ─────────────────────────────────────────────
   4. <user-dashboard>
   Orquestador: captura `greet`, activa pulsing
   Parts: container | slot-card | slot-weather | slot-badge
───────────────────────────────────────────── */
class UserDashboard extends HTMLElement {
  static PULSE_DURATION = 4000;
  #handler = null;
  #timer   = null;

  constructor() { super(); this.attachShadow({ mode: 'open' }); }

  connectedCallback()    { this.render(); this._bind(); }
  disconnectedCallback() {
    this.removeEventListener('greet', this.#handler);
    clearTimeout(this.#timer);
  }

  _bind() {
    this.#handler = (e) => {
      const badge = this.querySelector('warning-badge');
      if (!badge) return;

      badge.setAttribute('message', `¡Hola, ${e.detail?.name}! — Sesión por expirar`);
      badge.setAttribute('pulsing', '');

      clearTimeout(this.#timer);
      this.#timer = setTimeout(() => {
        badge.removeAttribute('pulsing');
        badge.setAttribute('message', 'Sesión por expirar');
      }, UserDashboard.PULSE_DURATION);
    };
    this.addEventListener('greet', this.#handler);
  }

  render() {
    this.shadowRoot.innerHTML = `
      <style>
        :host { display: block; font-family: var(--font-main, 'DM Sans', sans-serif); }

        .dashboard {
          display: grid;
          grid-template-columns: auto 1fr;
          gap: 1rem;
          align-items: start;
        }
        .left  { grid-row: 1 / 3; }
        .right { display: flex; flex-direction: column; gap: 0.75rem; }

        slot { display: contents; }
      </style>

      <div class="dashboard" part="container">
        <div class="left"  part="slot-card">    <slot name="card"></slot></div>
        <div class="right">
          <div part="slot-weather"><slot name="weather"></slot></div>
          <div part="slot-badge">  <slot name="badge"></slot></div>
        </div>
      </div>`;
  }
}
customElements.define('user-dashboard', UserDashboard);


/* ── Event log ── */
const logEntries = document.getElementById('log-entries');
let first = true;

document.getElementById('dashboard').addEventListener('greet', (e) => {
  if (first) { logEntries.innerHTML = ''; first = false; }
  const time = new Date().toLocaleTimeString('es-CR', { hour12: false });
  const div  = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-time">${time}</span>
    <span class="log-event">⚡ greet</span>
    <span class="log-detail">name="${e.detail.name}" → pulsing activado</span>`;
  logEntries.prepend(div);
});

</script>
</body>
</html>
