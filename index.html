<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Components · User Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font-main: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --bg:           #060b18;
      --card-bg:      #0f172a;
      --border:       rgba(255,255,255,0.07);
      --text-primary: #f8fafc;
      --text-muted:   #64748b;
      --accent:       #6366f1;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(56,189,248,0.06) 0%, transparent 60%);
    }

    .scene {
      width: min(520px, 100%);
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    header { display: flex; flex-direction: column; gap: 0.3rem; }

    .label {
      font-size: 0.72rem; font-weight: 600;
      color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.15em;
      font-family: var(--font-mono);
    }

    h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.03em; }
    h1 span { color: var(--accent); }

    user-card::part(button) { letter-spacing: 0.04em; }

    .event-log {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.2rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .event-log-title {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--accent); margin-bottom: 0.5rem;
    }
    #log-entries {
      display: flex; flex-direction: column;
      gap: 0.25rem; max-height: 120px; overflow-y: auto;
    }
    .log-entry { display: flex; gap: 0.75rem; align-items: baseline; }
    .log-time   { color: #475569; flex-shrink: 0; }
    .log-event  { color: #7dd3fc; }
    .log-detail { color: #a5b4fc; }
    .empty      { color: #334155; font-style: italic; }
  </style>
</head>
<body>

<div class="scene">
  <header>
    <h1>Dashboard del <span>Clima</span></h1>
  </header>

  <user-dashboard id="dashboard">
    <user-card     slot="card"    name="Alonso" role="Profesor"></user-card>
    <weather-time  slot="weather" city="Liberia, CR" temp="31" condition="Sunny"></weather-time>
    <warning-badge slot="badge"   message="Sesión por expirar"></warning-badge>
  </user-dashboard>

  <div class="event-log">
    <div class="event-log-title">🔌 Event log</div>
    <div id="log-entries">
      <span class="empty">Esperando eventos… (haz click en Saludar)</span>
    </div>
  </div>
</div>

<!--
  Los imports van AL FINAL del body.
  Así el parser ya conectó todos los nodos al DOM antes de que
  los define() corran → el upgrade es limpio y los slots se asignan.
-->
<script type="module">
  import './src/User-card.js';
  import './src/Weather-time.js';
  import './src/Warning-badge.js';
  import './src/User-dashboard.js';

  const logEntries = document.getElementById('log-entries');
  let first = true;

  document.getElementById('dashboard').addEventListener('greet', (e) => {
    if (first) { logEntries.innerHTML = ''; first = false; }
    const time = new Date().toLocaleTimeString('es-CR', { hour12: false });
    const div  = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-event">⚡ greet</span>
      <span class="log-detail">name="${e.detail.name}" → pulsing activado</span>`;
    logEntries.prepend(div);
  });
</script>
</body>
</html>
